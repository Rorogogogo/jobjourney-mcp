name: Test, Version Bump & Publish to npm

on:
  push:
    branches: [master]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          sed -i "s/export const PLUGIN_VERSION = .*/export const PLUGIN_VERSION = \"$NEW_VERSION\";/" src/version.ts
          npm run build
          git add package.json package-lock.json src/version.ts dist/
          git commit -m "chore: bump version to $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push
          git push --tags

      - name: Exchange OIDC token for npm publish token
        id: npm-token
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://registry.npmjs.org" | jq -r '.value')
          echo "OIDC token length: ${#OIDC_TOKEN}"
          EXCHANGE_RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://registry.npmjs.org/-/npm/v1/security/oidc/token" \
            -H "Content-Type: application/json" \
            -d "{\"token\": \"$OIDC_TOKEN\"}")
          HTTP_STATUS=$(echo "$EXCHANGE_RESPONSE" | tail -1 | sed 's/HTTP_STATUS://')
          RESPONSE_BODY=$(echo "$EXCHANGE_RESPONSE" | sed '$d')
          echo "Exchange HTTP status: $HTTP_STATUS"
          echo "Exchange response: $RESPONSE_BODY"
          NPM_TOKEN=$(echo "$RESPONSE_BODY" | jq -r '.token // empty')
          if [ -z "$NPM_TOKEN" ]; then
            echo "ERROR: Failed to get npm token from OIDC exchange"
            exit 1
          fi
          echo "::add-mask::$NPM_TOKEN"
          echo "token=$NPM_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm-token.outputs.token }}
